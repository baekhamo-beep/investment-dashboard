name: Fetch Market Data

on:
  schedule:
    # 미국 장 시간 (한국시간 23:30~06:00) 30분마다 + 장외 1회
    - cron: '0,30 14,15,16,17,18,19,20,21 * * 1-5'  # 평일 UTC 14~21시 (한국 23~06시)
    - cron: '0 0,12 * * *'                            # 매일 00:00 / 12:00 UTC 백업
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance requests pandas numpy
      - run: python fetch_data.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "chore: update market data $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
